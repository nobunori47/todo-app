<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>タスクを編集</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { font-size: 24px; margin-bottom: 24px; }
    .card { background: white; border-radius: 8px; padding: 24px; }
    label { display: block; font-size: 14px; color: #64748b; margin-bottom: 6px; margin-top: 16px; }
    input, textarea, select { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
    textarea { height: 100px; resize: vertical; }
    .btn { margin-top: 20px; width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    a { display: block; text-align: center; margin-top: 12px; color: #64748b; font-size: 14px; }
  </style>
</head>
<body>
  <h1>✏️ タスクを編集</h1>
  <div class="card">
    <form action="/edit/{{ todo.id }}" method="POST">
      <label>タイトル</label>
      <input type="text" name="title" value="{{ todo.タイトル }}" required>

      <label>内容</label>
      <textarea name="content">{{ todo.内容 }}</textarea>

      <label>期日</label>
      <input type="date" name="due_date" value="{{ todo.期日 }}">

      <label>優先度</label>
      <select name="priority">
        <option value="高" {% if todo.priority == '高' %}selected{% endif %}>🔴 高</option>
        <option value="中" {% if todo.priority == '中' %}selected{% endif %}>🟡 中</option>
        <option value="低" {% if todo.priority == '低' %}selected{% endif %}>🟢 低</option>
      </select>

      <button type="submit" class="btn">更新する</button>
    </form>
  </div>
  <a href="/">← 一覧に戻る</a>
</body>
</html>
